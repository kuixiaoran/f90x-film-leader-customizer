version: "3"

includes:
  common: ../Taskfile.yml

tasks:
  build:
    summary: Builds the application for Windows
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          DEV:
            ref: .DEV
    cmds:
      - task: ensure:icon
        if: '{{ne .DEV "true"}}'
      - task: generate:syso
        if: '{{ne .DEV "true"}}'
      - go build {{.BUILD_FLAGS}} -o {{.BIN_DIR}}/{{.APP_NAME}}.exe
      - cmd: powershell Remove-Item -ErrorAction SilentlyContinue wails_windows_*.syso
    env:
      GOOS: windows
      CGO_ENABLED: 0
      GOARCH: "{{.ARCH | default ARCH}}"
    vars:
      BUILD_FLAGS: '{{if eq .PRODUCTION "true"}}-tags production -trimpath -buildvcs=false -ldflags="-w -s -H windowsgui"{{else}}-buildvcs=false -gcflags=all="-l"{{end}}'
      PRODUCTION: '{{.PRODUCTION | default "false"}}'
      DEV: '{{.DEV | default "false"}}'

  ensure:icon:
    summary: Ensure app icon (build/appicon.png → windows/icon.ico)
    dir: build
    cmds:
      - powershell -NoProfile -ExecutionPolicy Bypass -File ./set-app-icon.ps1

  package:
    summary: Packages a production build (requires NSIS setup)
    deps:
      - task: build
        vars:
          PRODUCTION: "true"
    cmds:
      - echo "Use wails3 update build-assets to add NSIS packaging, or run wails3 build for the .exe"

  generate:syso:
    summary: Generates Windows .syso file
    dir: build
    cmds:
      - wails3 generate syso -arch {{.ARCH}} -icon windows/icon.ico -manifest windows/wails.exe.manifest -info windows/info.json -out ../wails_windows_{{.ARCH}}.syso
    vars:
      ARCH: "{{.ARCH | default ARCH}}"

  run:
    summary: Runs the built Windows binary
    cmds:
      - ./{{.BIN_DIR}}/{{.APP_NAME}}.exe
